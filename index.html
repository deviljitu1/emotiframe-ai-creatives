<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EmotiFrame AI | Premium Frame Generator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <div class="misty-glow"></div>
    <div class="misty-glow-2"></div>

    <header>
        <a href="#" class="logo">Emoti<span>Frame</span> AI</a>
        <div style="display: flex; gap: 1rem;">
            <a href="https://wa.me/917875783498" target="_blank" class="action-btn">
                <i data-lucide="help-circle"></i> Help
            </a>
        </div>
    </header>

    <main>
        <aside class="sidebar">
            <div class="control-group">
                <label>Describe the memory</label>
                <textarea id="promptInput" rows="4" placeholder="e.g. A portrait of a happy family at sunset in a golden field..."></textarea>
            </div>

            <div class="control-group">
                <label>Edit Style (EmotiFrame Presets)</label>
                <div class="style-grid" id="styleGrid">
                    <div class="style-item active" data-style="cinematic, professionally lit, masterpiece, high detail">Cinematic</div>
                    <div class="style-item" data-style="velvet texture, soft focus, luxurious feel, soft lighting">Velvet Texture</div>
                    <div class="style-item" data-style="oil painting, brushed texture, fine art, classical">Oil Painting</div>
                    <div class="style-item" data-style="sketch style, pencil drawing, charcoal texture, artistic">Sketch</div>
                    <div class="style-item" data-style="black and white, high contrast, elegant, timeless">Monochrome</div>
                    <div class="style-item" data-style="3d render, unreal engine 5, octane render, vivid colors">3D Modern</div>
                </div>
            </div>

            <div class="control-group">
                <label>AI Model</label>
                <select id="modelSelect">
                    <option value="turbo">Turbo (Fast & Reliable)</option>
                    <option value="flux">Flux (High Detail - Stills)</option>
                </select>
            </div>

            <div class="control-group">
                <label>Frame Width</label>
                <select id="frameSize">
                    <option value="40px">Classic Thick (40px)</option>
                    <option value="20px">Modern Slim (20px)</option>
                    <option value="60px">Lux Bold (60px)</option>
                </select>
            </div>

            <button class="generate-btn" id="generateBtn">
                <i data-lucide="sparkles"></i> Generate Branded Post
            </button>
            <p style="font-size: 0.75rem; color: #64748B; text-align: center; margin-top: 1rem;">
                Powered by Pollinations AI & EmotiFrame Brand Engine
            </p>
        </aside>

        <section class="canvas-area">
            <div class="frame-container" id="frameContainer">
                <div class="frame-inner-border"></div>
                <img src="https://images.unsplash.com/photo-1544005313-94ddf0286df2?q=80&w=1000&auto=format&fit=crop" class="output-image" id="outputImage">
                <div class="loading-overlay" id="loadingOverlay">
                    <div class="spinner"></div>
                    <p>Crafting your masterpiece...</p>
                </div>
            </div>

            <div class="action-bar">
                <button class="action-btn" id="downloadBtn"><i data-lucide="download"></i> Save Frame</button>
                <button class="action-btn" id="shareBtn"><i data-lucide="share-2"></i> Share</button>
            </div>
        </section>
    </main>

    <script>
        lucide.createIcons();

        const promptInput = document.getElementById('promptInput');
        const styleItems = document.querySelectorAll('.style-item');
        const generateBtn = document.getElementById('generateBtn');
        const outputImage = document.getElementById('outputImage');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const frameContainer = document.getElementById('frameContainer');
        const frameSizeSelect = document.getElementById('frameSize');
        const modelSelect = document.getElementById('modelSelect');

        let selectedStyle = "cinematic, professionally lit, masterpiece, high detail";

        // Style selection
        styleItems.forEach(item => {
            item.addEventListener('click', () => {
                styleItems.forEach(i => i.classList.remove('active'));
                item.classList.add('active');
                selectedStyle = item.dataset.style;
            });
        });

        // Frame size change
        frameSizeSelect.addEventListener('change', (e) => {
            frameContainer.style.padding = e.target.value;
        });

        // Generation logic
        generateBtn.addEventListener('click', async () => {
            const userPrompt = promptInput.value.trim();
            if(!userPrompt) {
                alert("Please describe what you'd like to frame!");
                return;
            }

            generateBtn.disabled = true;
            loadingOverlay.style.display = 'flex';
            loadingOverlay.querySelector('p').innerText = "Crafting your masterpiece...";

            const selectedModel = modelSelect.value;
            // Simplified brand instruction to avoid special character issues
            const brandInfo = "with EmotiFrame brand aesthetic";
            const cleanPrompt = `${userPrompt}, ${selectedStyle}, ${brandInfo}`;
            
            // Standard construction for the prompt
            const fullPrompt = encodeURIComponent(cleanPrompt);
            const seed = Math.floor(Math.random() * 1000000);
            
            // Using the most stable Pollinations endpoint
            const imageUrl = `https://pollinations.ai/p/${fullPrompt}?width=1024&height=1024&seed=${seed}&model=${selectedModel}`;

            console.log("Generating with stable URL:", imageUrl);

            // Hide the default image while loading
            outputImage.style.opacity = "0.3";

            // Wait for image to load
            const img = new Image();
            img.onload = () => {
                outputImage.src = imageUrl;
                outputImage.style.opacity = "1";
                loadingOverlay.style.display = 'none';
                generateBtn.disabled = false;
            };
            img.onerror = (err) => {
                console.error("Pollinations Error Event:", err);
                alert("The AI server is experiencing high traffic. Please try again in a few seconds or use the 'Turbo' model.");
                loadingOverlay.style.display = 'none';
                outputImage.style.opacity = "1";
                generateBtn.disabled = false;
            };
            img.src = imageUrl;
        });

        // Simple download (opens in new tab)
        document.getElementById('downloadBtn').addEventListener('click', () => {
            window.open(outputImage.src, '_blank');
        });
    </script>
</body>
</html>
